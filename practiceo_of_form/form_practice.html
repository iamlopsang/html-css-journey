<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- Main heading of the page -->
    <h1>Welcome to My Form Practice Page</h1>

    <form action="" method="post" enctype="multipart/form-data">
        <!-- Form container: uses POST method and allows file upload -->
        <section>
            <!-- Grouping form elements -->

             <!-- Full Name Input -->
            <label for="name">Full Name: </label>
            <input id="name" name="name" type="text" placeholder="John" minlength="5" maxlength="15" required ><br><br>

            <!-- Username Input -->
            <label for="username">Username: </label>
            <input id="username" name="username" type="text" placeholder="john123" minlength="5"  maxlength="20" required><br><br>

            <!-- Password Input -->
            <label for="password">Password: </label>
            <input id="password" name="password" type="password" minlength="8" maxlength="15" required><br><br>

            <!-- Email Input -->
            <label for="email">Email: </label>
            <input id="email" name="email" type="email" placeholder="john@gmail.com" required><br><br>

            <!-- Phone Number Input with Pattern Validation -->
            <label for="phone">Phone Number: </label>
            <input id="phone" name="phone" type="tel" placeholder="1234-123-234-333" pattern="[0-9]{4}-[0-9]{3}-[0-9]{3}-[0-9]{3}" required ><br><br>

            <!-- Date of Birth Input -->
            <label for="bdate">Birth Date: </label>
            <input id="bdate" name="bdate" type="date" ><br><br>

            <!-- Quantity Input -->
            <label for="quantity">Quantity: </label>
            <input id="quantity" name="quantity" type="number" min="1" max="99" value="1"><br><br>

            <!-- Gender Selection using Radio Buttons -->
            <label for="gender">Gender: </label><br>

            <label for="male">Male: </label>
            <input id="male" type="radio" value="male" name="gender">

            <label for="female">Female: </label>
            <input id="female" type="radio" value="female" name="gender" checked>

            <label for="other">Other: </label>
            <input id="other" type="radio" value="other" name="gender" ><br><br>


            <!-- Payment Method Dropdown -->
            <label for="payment" >Payment Method:</label><br><br>
            <select id="payment" name="payment">
                <option value="mastercard">Mastercard</option>
                <option value="visacard">Visa Card</option>
                <option value="paypal">PayPal</option>
            </select><br><br>


            <!-- Hobbies Selection using Checkboxes -->
            <label for="hobbies">Hobbies:  </label><br><br>

            <label for="movies" >Watching Movies</label>
            <input id="movies" type="checkbox" name="hobbies" value="movies" checked>

            <label for="painting">Painting</label>
            <input id="painting" type="checkbox" name="hobbies" value="painting" >

            <label for="cooking">Cooking</label>
            <input id="cooking" type="checkbox" name="hobbies" value="cooking"><br><br>


            <!-- File Upload Input -->
            <label for="file">File:</label><br>
            <input id="file" type="file" accept="image/png, image/jpeg"><br><br>

            <!-- Comment Textarea -->
            <label for="comment">Comment: </label><br>
            <textarea id="comment" name="comment" rows="7" cols="15" placeholder="write the comment and suggestion here..."></textarea><br><br>

            <!-- Reset and Submit Buttons -->
            <input id="reset" type="reset"><br><br>
            <input id="submit" type="submit"><br><br>

        </section>

    </form>
</body>
</html>
