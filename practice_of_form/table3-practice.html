<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Bill Table</title>
</head>
<body>
    <!-- Table to display shopping bill -->
    <table border="1" cellspacing="0">
            <caption style="text-align: center;">Shopping Bill</caption>
        
             <!-- Table header -->
        <thead>
            <tr>
            <th>Item</th>
            <th>Quantity</th>
            <th>Price</th>
            <th>Total</th>
        </tr>
        </thead>    
        

        <!-- Table body containing the items -->
        <tbody>
        <tr>
            <td>Pen</td>
            <td>5</td>
            <td>10</td>
            <td>50</td>
        </tr>

        <tr>
            <td>Book</td>
            <td>2</td>
            <td>1500</td>
            <td>3000</td>
        </tr>

        <tr>
            <td>Bag</td>
            <td>1</td>
            <td>800</td>
            <td>800</td>
        </tr>
        </tbody>

         <!-- Table footer for grand total -->
        <tfoot>
             <tr>
            <td colspan="3">Grand Total:</td>
            <td>3850</td>
        </tr>
        </tfoot>
    </table>
</body>
</html>
