<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Marks Table</title>
</head>

<body>
    <h1>Student Marks Table</h1>

    <!-- Table to display student marks -->
    <table border="2">

        <!-- Caption for the table -->
        <caption>Student Marks Sheet</caption>
        <tr>
            <th>Roll No </th>
            <th>Name </th>
            <th>Math </th>
            <th>Science </th>
            <th>English</th>
        </tr>

        <!-- Data rows for students -->
        <tr>
            <td>1</td>
            <td>Ram</td>
            <td>78</td>
            <td>85</td>
            <td>80</td>
        </tr>
        <tr>
            <td>2</td>
            <td>Sita</td>
            <td>88</td>
            <td>90</td>
            <td>92</td>
        </tr>

        <tr>
            <td>3</td>
            <td>Hari</td>
            <td>70</td>
            <td>75</td>
            <td>72</td>
        </tr>
    </table>
</body>
</html>
